<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#f5f5f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.screen{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.lock-icon{display:flex;justify-content:center;margin-bottom:24px;}
.lock-circle{width:72px;height:72px;background:#EEEDFE;border-radius:50%;display:flex;align-items:center;justify-content:center;}
h1{font-size:22px;font-weight:600;color:#111;text-align:center;margin-bottom:6px;}
.subtitle{font-size:15px;color:#888;text-align:center;margin-bottom:28px;}
label{display:block;font-size:14px;color:#666;margin-bottom:6px;}
.input-wrap{position:relative;margin-bottom:6px;}
.input-wrap input{width:100%;padding:13px 44px 13px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:18px;letter-spacing:4px;color:#111;background:#f8f8f8;outline:none;font-family:inherit;}
.input-wrap input:focus{border-color:#534AB7;box-shadow:0 0 0 2px rgba(83,74,183,0.15);background:#fff;}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:4px;}
.error{font-size:13px;color:#E24B4A;margin-bottom:16px;min-height:18px;text-align:center;}
.btn-login{width:100%;padding:15px;border:none;background:#534AB7;color:#fff;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-login:active{transform:scale(0.98);}
.shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="screen">
  <div class="card">
    <div class="lock-icon">
      <div class="lock-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Enter your password to continue</p>
    <label>Password</label>
    <div class="input-wrap" id="inputWrap">
      <input type="password" id="pwInput" maxlength="20" placeholder="••••" onkeydown="if(event.key==='Enter')tryLogin()"/>
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1">
        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <p class="error" id="errorMsg"></p>
    <button class="btn-login" onclick="tryLogin()">Unlock</button>
  </div>
</div>

<script>
const PASSWORD = "1234";

function tryLogin(){
  const val = document.getElementById("pwInput").value;
  if(val === PASSWORD){
    sessionStorage.setItem("auth","1");
    window.location.href = "vocabulary_app.html";
  } else {
    const wrap = document.getElementById("inputWrap");
    document.getElementById("errorMsg").textContent = "Incorrect password. Try again.";
    wrap.classList.remove("shake");
    void wrap.offsetWidth;
    wrap.classList.add("shake");
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
  }
}

function togglePw(){
  const input = document.getElementById("pwInput");
  input.type = input.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
