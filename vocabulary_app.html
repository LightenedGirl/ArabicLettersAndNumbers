<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>My Vocabulary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#f5f5f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{width:100%;min-height:100vh;background:#f5f5f0;}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:18px 18px 14px;position:sticky;top:0;z-index:10;}
.title-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.app-title{font-size:24px;font-weight:600;color:#111;flex:1;border:none;background:transparent;outline:none;font-family:inherit;}
.app-title:focus{border-bottom:2px solid #534AB7;}
.edit-title-btn{background:none;border:none;cursor:pointer;color:#aaa;padding:4px;border-radius:4px;display:flex;align-items:center;}
.search-wrap{position:relative;}
.search-wrap input{width:100%;padding:11px 14px 11px 42px;border-radius:10px;border:0.5px solid #ddd;background:#f0f0f0;font-size:17px;color:#111;outline:none;font-family:inherit;}
.search-wrap input:focus{border-color:#534AB7;box-shadow:0 0 0 2px rgba(83,74,183,0.15);background:#fff;}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#999;pointer-events:none;}
.clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:4px;line-height:1;}
.word-count{padding:10px 18px 4px;font-size:14px;color:#999;}
.word-list{padding:0 14px 100px;display:flex;flex-direction:column;gap:10px;}
.word-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.word-card:active{opacity:0.8;}
.card-img{width:100%;height:150px;object-fit:cover;display:block;}
.card-body{padding:16px 18px;}
.word-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.word-title{font-size:20px;font-weight:600;color:#111;}
.word-lang{font-size:14px;color:#534AB7;background:#EEEDFE;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.word-desc{margin-top:7px;font-size:15px;color:#555;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.no-results{text-align:center;padding:60px 18px;color:#aaa;font-size:17px;}
.fab{position:fixed;bottom:28px;right:22px;background:#534AB7;color:#fff;border:none;border-radius:50%;width:62px;height:62px;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 16px rgba(83,74,183,0.4);}
.fab:active{transform:scale(0.94);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:30;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 36px;width:100%;max-height:92vh;overflow-y:auto;}
.sheet h2{font-size:20px;font-weight:600;color:#111;margin-bottom:16px;}
.sheet label{display:block;font-size:14px;color:#666;margin-bottom:5px;}
.sheet input[type=text],.sheet textarea{width:100%;margin-bottom:14px;padding:12px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:17px;font-family:inherit;color:#111;background:#f8f8f8;outline:none;}
.sheet textarea{min-height:88px;resize:none;}
.sheet input[type=text]:focus,.sheet textarea:focus{border-color:#534AB7;box-shadow:0 0 0 2px rgba(83,74,183,0.15);background:#fff;}
.img-upload-area{border:1px dashed #ccc;border-radius:10px;padding:18px;text-align:center;cursor:pointer;margin-bottom:14px;background:#f8f8f8;}
.img-upload-area p{font-size:15px;color:#888;margin-top:8px;}
.img-preview{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:block;}
.img-remove{font-size:14px;color:#E24B4A;background:none;border:none;cursor:pointer;margin-bottom:14px;display:block;}
.modal-btns{display:flex;gap:12px;margin-top:6px;}
.btn-cancel{flex:1;padding:14px;border:0.5px solid #ddd;background:#f0f0f0;border-radius:10px;font-size:17px;cursor:pointer;color:#333;font-family:inherit;}
.btn-save{flex:1;padding:14px;border:none;background:#534AB7;color:#fff;border-radius:10px;font-size:17px;cursor:pointer;font-weight:600;font-family:inherit;}
.btn-save:disabled{opacity:0.45;cursor:default;}
.d-word{font-size:26px;font-weight:600;color:#111;margin-bottom:6px;}
.d-lbl{font-size:13px;color:#aaa;margin-bottom:3px;}
.d-val{font-size:18px;color:#534AB7;font-weight:600;margin-bottom:14px;}
.d-desc{font-size:16px;color:#555;line-height:1.7;margin-bottom:20px;}
.d-img{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:18px;display:block;}
.det-btns{display:flex;gap:12px;}
.btn-del{flex:1;padding:14px;border:0.5px solid #E24B4A;background:none;color:#E24B4A;border-radius:10px;font-size:17px;cursor:pointer;font-family:inherit;}
.btn-edit{flex:1;padding:14px;border:none;background:#534AB7;color:#fff;border-radius:10px;font-size:17px;cursor:pointer;font-weight:600;font-family:inherit;}
.alpha-badge{padding:10px 18px 4px;font-size:13px;font-weight:600;color:#aaa;letter-spacing:.06em;}
.highlight{background:#EEEDFE;color:#3C3489;border-radius:2px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="title-row">
      <input class="app-title" id="appTitle" type="text" value="My Vocabulary" maxlength="40" onblur="saveTitle()" onkeydown="if(event.key==='Enter')this.blur()"/>
      <button class="edit-title-btn" onclick="document.getElementById('appTitle').focus()" title="Edit title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input type="text" id="searchInput" oninput="handleSearch(this.value)" autocomplete="off"/>
      <button class="clr" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
    </div>
  </div>
  <div class="word-count" id="wordCount"></div>
  <div class="word-list" id="wordList"></div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h2 id="modalTitle">Add new word</h2>
    <label>Word</label>
    <input type="text" id="fWord" placeholder="e.g. Ephemeral" oninput="checkForm()"/>
    <label>Translation / name in another language</label>
    <input type="text" id="fLang" placeholder="e.g. Malayalam translation"/>
    <label>Description / meaning</label>
    <textarea id="fDesc" placeholder="Write the meaning or usage…"></textarea>
    <label>Image (optional)</label>
    <div id="imgUploadArea" class="img-upload-area" onclick="document.getElementById('imgFile').click()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <p>Tap to choose a photo</p>
    </div>
    <img id="imgPreview" class="img-preview" style="display:none"/>
    <button id="imgRemoveBtn" class="img-remove" onclick="removeImg()" style="display:none">Remove image</button>
    <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveWord()" disabled>Save</button>
    </div>
  </div>
</div>

<div class="overlay" id="detOverlay">
  <div class="sheet">
    <img id="dImg" class="d-img" style="display:none"/>
    <p class="d-word" id="dWord"></p>
    <p class="d-lbl">Translation</p>
    <p class="d-val" id="dLang"></p>
    <p class="d-lbl">Description</p>
    <p class="d-desc" id="dDesc"></p>
    <div class="det-btns">
      <button class="btn-del" onclick="deleteWord()">Delete</button>
      <button class="btn-edit" onclick="editWord()">Edit</button>
    </div>
  </div>
</div>

<script>
let words=JSON.parse(localStorage.getItem('vocab_words')||'[]');
let searchQ="",editId=null,viewId=null,nextId=parseInt(localStorage.getItem('vocab_nextId')||'1'),pendingImg=null;

const appTitleEl=document.getElementById('appTitle');
appTitleEl.value=localStorage.getItem('vocab_title')||'My Vocabulary';

function saveTitle(){
  if(!appTitleEl.value.trim())appTitleEl.value='My Vocabulary';
  localStorage.setItem('vocab_title',appTitleEl.value);
}
function persist(){
  localStorage.setItem('vocab_words',JSON.stringify(words));
  localStorage.setItem('vocab_nextId',nextId);
}
function sorted(arr){return[...arr].sort((a,b)=>a.word.localeCompare(b.word));}
function hl(text,q){if(!q)return text;const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp(e,'gi'),m=>`<span class="highlight">${m}</span>`);}

function render(){
  const list=document.getElementById("wordList");
  const q=searchQ.toLowerCase();
  let filtered=q?words.filter(w=>w.word.toLowerCase().includes(q)||w.lang.toLowerCase().includes(q)||w.desc.toLowerCase().includes(q)):words;
  filtered=sorted(filtered);
  document.getElementById("wordCount").textContent=filtered.length+" word"+(filtered.length!==1?"s":"");
  if(!filtered.length){list.innerHTML=`<div class="no-results">${searchQ?"No words match your search.":"No words yet. Tap + to add one."}</div>`;return;}
  let html="",lastLetter="";
  filtered.forEach(w=>{
    const letter=w.word[0].toUpperCase();
    if(letter!==lastLetter){html+=`<div class="alpha-badge">${letter}</div>`;lastLetter=letter;}
    html+=`<div class="word-card" onclick="openDetail(${w.id})">
      ${w.img?`<img class="card-img" src="${w.img}" alt=""/>`:""}
      <div class="card-body">
        <div class="word-header">
          <span class="word-title">${hl(w.word,searchQ)}</span>
          ${w.lang?`<span class="word-lang">${hl(w.lang.split(" ")[0],searchQ)}</span>`:""}
        </div>
        ${w.desc?`<p class="word-desc">${hl(w.desc,searchQ)}</p>`:""}
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

function handleSearch(v){searchQ=v;document.getElementById("clearBtn").style.display=v?"block":"none";render();}
function clearSearch(){document.getElementById("searchInput").value="";handleSearch("");}

function openAdd(){
  editId=null;pendingImg=null;
  document.getElementById("modalTitle").textContent="Add new word";
  ["fWord","fLang","fDesc"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("imgPreview").style.display="none";
  document.getElementById("imgRemoveBtn").style.display="none";
  document.getElementById("imgUploadArea").style.display="block";
  document.getElementById("imgFile").value="";
  document.getElementById("saveBtn").disabled=true;
  document.getElementById("addOverlay").classList.add("open");
}
function closeAdd(){document.getElementById("addOverlay").classList.remove("open");}
function checkForm(){document.getElementById("saveBtn").disabled=!document.getElementById("fWord").value.trim();}

function handleImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImg=e.target.result;
    document.getElementById("imgPreview").src=pendingImg;
    document.getElementById("imgPreview").style.display="block";
    document.getElementById("imgRemoveBtn").style.display="block";
    document.getElementById("imgUploadArea").style.display="none";
  };
  reader.readAsDataURL(file);
}
function removeImg(){
  pendingImg=null;
  document.getElementById("imgPreview").style.display="none";
  document.getElementById("imgRemoveBtn").style.display="none";
  document.getElementById("imgUploadArea").style.display="block";
  document.getElementById("imgFile").value="";
}

function saveWord(){
  const word=document.getElementById("fWord").value.trim();
  const lang=document.getElementById("fLang").value.trim();
  const desc=document.getElementById("fDesc").value.trim();
  if(!word)return;
  if(editId!==null){
    const w=words.find(x=>x.id===editId);
    if(w){w.word=word;w.lang=lang;w.desc=desc;if(pendingImg!==null)w.img=pendingImg;}
  }else{
    words.push({id:nextId++,word,lang,desc,img:pendingImg});
  }
  persist();closeAdd();render();
}

function openDetail(id){
  viewId=id;
  const w=words.find(x=>x.id===id);if(!w)return;
  document.getElementById("dWord").textContent=w.word;
  document.getElementById("dLang").textContent=w.lang||"—";
  document.getElementById("dDesc").textContent=w.desc||"—";
  const di=document.getElementById("dImg");
  if(w.img){di.src=w.img;di.style.display="block";}else{di.style.display="none";}
  document.getElementById("detOverlay").classList.add("open");
}
function closeDetail(){document.getElementById("detOverlay").classList.remove("open");}
function deleteWord(){words=words.filter(w=>w.id!==viewId);persist();closeDetail();render();}
function editWord(){
  const w=words.find(x=>x.id===viewId);if(!w)return;
  closeDetail();
  editId=w.id;pendingImg=w.img||null;
  document.getElementById("modalTitle").textContent="Edit word";
  document.getElementById("fWord").value=w.word;
  document.getElementById("fLang").value=w.lang;
  document.getElementById("fDesc").value=w.desc;
  if(w.img){
    document.getElementById("imgPreview").src=w.img;
    document.getElementById("imgPreview").style.display="block";
    document.getElementById("imgRemoveBtn").style.display="block";
    document.getElementById("imgUploadArea").style.display="none";
  }else{
    document.getElementById("imgPreview").style.display="none";
    document.getElementById("imgRemoveBtn").style.display="none";
    document.getElementById("imgUploadArea").style.display="block";
  }
  document.getElementById("saveBtn").disabled=false;
  document.getElementById("addOverlay").classList.add("open");
}

document.getElementById("addOverlay").addEventListener("click",function(e){if(e.target===this)closeAdd();});
document.getElementById("detOverlay").addEventListener("click",function(e){if(e.target===this)closeDetail();});
render();
</script>
</body>
</html>
